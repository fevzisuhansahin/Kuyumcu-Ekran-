<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuyumcu Ekranı</title>
    <link rel="icon" href="/logo.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&subset=latin-ext&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/css/index.css">
</head>

<body>

    <div class="ust-bilgi">
        <div class="zaman-paneli">
            <div class="saat-kismi" id="saat-metni">--:--<span class="saniye">:--</span></div>
            <div class="tarih-kismi" id="tarih-metni">Yükleniyor...</div>
        </div>

        <img src="/logo.png" alt="Dernek Logosu" class="uygulama-logosu">

        <h1 class="baslik">Gediz Sarraflar Derneği</h1>
        <div class="sag-butonlar">
            <button id="login-yonlendir-butonu" onclick="window.open('/gediz_sistem_yonetim_0103', '_blank')">Giriş
                Yap</button>
            <button id="tema-butonu">☀️ Açık Tema</button>
        </div>
    </div>

    <div id="ekran-icerik">
        <h2 style="text-align:center; color:var(--renk-soluk); grid-column: 1 / 3; align-self: center;">
            Fiyatlar Piyasadan Yükleniyor...
        </h2>
    </div>

    <div class="alt-bant">
        <marquee id="kayan-yazi-ekrani" scrollamount="8">Yükleniyor...</marquee>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/index.js"></script>
</body>

</html>
